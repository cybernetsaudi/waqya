name: Waqya News Pipeline

on:
  schedule:
    # Run every 4 hours at minute 15 (avoid the exact hour when GH Actions is busiest)
    - cron: "15 */4 * * *"
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

env:
  OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
  NEWSAPI_KEY:         ${{ secrets.NEWSAPI_KEY }}
  WP_URL:              ${{ secrets.WP_URL }}
  WP_USER:             ${{ secrets.WP_USER }}
  WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
  TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
  PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: automation/requirements.txt

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      # Download the dedup database from a previous run (if it exists)
      - name: Download dedup database
        uses: actions/cache@v4
        with:
          path: automation/seen.db
          key: dedup-db-v1

      - name: Run pipeline
        working-directory: automation
        run: python pipeline.py
