# ── Waqya.com Pipeline Configuration ──

site:
  name: "Waqya"
  tagline: "AI-Powered News Commentary"
  url: "https://waqya.com"

# How many articles to generate per pipeline run
pipeline:
  max_articles_per_run: 5
  min_words: 600
  max_words: 1200
  delay_between_articles_seconds: 25
  # true = publish live immediately (no manual approve). false = drafts for review.
  auto_publish: true

# Taxonomy source of truth: automation/waqya_categories.yaml
taxonomy:
  source: waqya_categories.yaml

# Images: 1 hero (featured) + inline images in article body
images:
  enabled: true
  provider: pexels
  inline_count: 3
  fallbacks:
    - og_image

# Automated SEO after each publish
seo:
  enabled: true
  ping_sitemaps: true
  add_schema: true
  add_related_links: true
  indexnow: false  # set true after INDEXNOW_KEY is on site root

# RSS feeds: defined in waqya_categories.yaml when taxonomy.source is set
rss_feeds: []

trending:
  enabled: true
  newsapi_top_headlines: true
  google_trends: true
  max_keywords: 40
  search_top_queries: 3

# NewsAPI settings (supplements RSS)
newsapi:
  enabled: true
  domains: "bbc.co.uk,reuters.com,techcrunch.com,theverge.com,arstechnica.com,aljazeera.com"
  language: "en"
  sort_by: "publishedAt"
  page_size: 20
  top_headline_categories:
    - general
    - business
    - technology
    - science
    - health

# OpenAI model settings
openai:
  model: "gpt-4o-mini"
  temperature: 0.85
  headline_temperature: 0.9
  max_tokens: 2000

default_category: current-affairs
