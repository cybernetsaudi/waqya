# ── Waqya.com Pipeline Configuration ──

site:
  name: "Waqya"
  tagline: "The incident is the story. We unpack what happened—and what it means next."
  url: "https://waqya.com"

# WordPress REST API (GitHub Actions → Hostinger)
wordpress:
  retry_max_attempts: 5
  retry_backoff_seconds: 3
  retry_status_codes: [403, 429, 502, 503, 504]
  request_delay_seconds: 0.25

# How many articles to generate per pipeline run
pipeline:
  max_articles_per_run: 5
  min_words: 600
  max_words: 1200
  delay_between_articles_seconds: 25
  # true = publish live immediately (no manual approve). false = drafts for review.
  auto_publish: true
  # quality_gated = auto-publish when score >= threshold; else draft + Telegram hold
  publish_mode: quality_gated
  require_min_quality_score: 78
  always_draft_below_score: 55
  # Spread stories across desks; block duplicate topic clusters (Hantavirus ×8, etc.)
  diversity:
    enabled: true
    max_per_cluster_per_run: 1
    max_per_primary_per_run: 4
    min_distinct_primaries_per_run: 4
    cluster_overlap_threshold: 0.35
    # Hard block: same topic cluster on site (72h) + max 1 Trump/Iran/etc per day (24h)
    recent_hours: 72
    entity_window_hours: 24
    max_per_entity_per_day: 1
    hard_block_recent_clusters: true
    source_url_window_hours: 168
    trending_score_cap: 10.0
    saturation_penalty: 12.0
    primary_daily_cap: 6

# 30-day editorial focus — depth on priority desks (disable or expire via end_date)
focus_mode:
  enabled: true
  start_date: "2026-07-09"
  end_date: "2026-08-08"
  priority_desks:
    - middle-east
    - south-asia
    - united-kingdom
    - united-states
    - technology-ai
    - fashion-style
  deprioritized_desks:
    - sport
    - entertainment-arts
    - education
    - disasters-emergencies
    - science
  priority_boost: 6.0
  deprioritize_penalty: 8.0
  reserve_slots_per_run: 3
  topic_queries_per_run: 4
  topic_queries:
    - query: "(Gaza OR Israel OR Iran OR Hezbollah OR Lebanon OR Syria) AND (war OR ceasefire OR diplomacy OR strike)"
      category: middle-east
      page_size: 8
    - query: "(India OR Pakistan OR Bangladesh OR Kashmir) AND (politics OR election OR conflict OR economy)"
      category: south-asia
      page_size: 8
    - query: "(Starmer OR Labour OR Westminster OR NHS OR Brexit) AND (UK OR Britain OR England)"
      category: united-kingdom
      page_size: 8
    - query: "(Trump OR Congress OR White House OR Supreme Court) AND (US OR America)"
      category: united-states
      page_size: 8
    - query: "(artificial intelligence OR OpenAI OR Nvidia OR semiconductor OR cybersecurity)"
      category: technology-ai
      page_size: 8
    - query: "(fashion week OR runway OR couture OR streetwear OR Vogue OR \"luxury brand\" OR Met Gala)"
      category: fashion-style
      page_size: 8

# Taxonomy source of truth: automation/waqya_categories.yaml
taxonomy:
  source: waqya_categories.yaml

# Images: 1 hero (featured) + inline images in article body
images:
  enabled: true
  provider: pexels
  inline_count: 3
  # Before each run: load Pexels IDs + image URLs already on waqya.com into images.db
  sync_from_site: true
  sync_max_post_pages: 10
  fallbacks:
    - og_image

# Automated SEO after each publish
seo:
  enabled: true
  ping_sitemaps: true
  add_schema: true
  add_related_links: true
  indexnow: false  # set true after INDEXNOW_KEY is on site root
  seo_title_max_chars: 55
  meta_description_min_chars: 135
  meta_description_max_chars: 155

# RSS feeds: defined in waqya_categories.yaml when taxonomy.source is set
rss_feeds: []

trending:
  enabled: true
  newsapi_top_headlines: false  # saves ~5 NewsAPI calls/run — use Google Trends + RSS instead
  google_trends: true
  # Regional Google Trends RSS (geo codes) — boosts incident/crime stories when they spike locally
  google_trends_geos:
    - geo: US
      weight: 3.0
    - geo: GB
      weight: 3.5
    - geo: IN
      weight: 3.5
    - geo: PK
      weight: 3.5
    - geo: SA
      weight: 3.0
    - geo: AE
      weight: 3.0
  max_keywords: 55
  search_top_queries: 2

# NewsAPI settings (supplements RSS — free tier ~100 req/day; budget enforced in newsapi_budget.py)
newsapi:
  enabled: true
  max_requests_per_day: 90
  max_requests_per_run: 12
  topic_queries_per_run: 3
  country_headlines_per_run: 2
  top_headlines_enabled: false
  everything_enabled: false
  domains: "bbc.co.uk,reuters.com,techcrunch.com,theverge.com,arstechnica.com,aljazeera.com,theguardian.com,dw.com,france24.com"
  language: "en"
  sort_by: "publishedAt"
  page_size: 25
  top_headlines_page_size: 12
  top_headline_categories:
    - general
    - business
    - technology
    - science
    - health
  # Country headlines (NewsAPI country codes)
  regional_countries:
    ae: middle-east
    il: middle-east
    in: south-asia
    pk: south-asia
    gb: united-kingdom
    us: united-states
  # Targeted searches (uses /everything — 1 request each)
  topic_queries:
    - query: "Gaza OR Israel OR Iran OR Hezbollah OR Yemen"
      category: middle-east
      page_size: 8
    - query: "India OR Pakistan OR Bangladesh OR Kashmir"
      category: south-asia
      page_size: 8
    - query: "(murder OR stabbing OR killing OR \"man charged\") AND (UK OR Britain OR England)"
      category: crime-justice
      page_size: 8
    - query: "(murder OR killed OR attack OR blast OR stabbing) AND (India OR Pakistan OR Bangladesh)"
      category: crime-justice
      page_size: 8
    - query: "(killed OR explosion OR attack OR airstrike) AND (Lebanon OR Syria OR Iraq OR Jordan OR West Bank)"
      category: middle-east
      page_size: 8
    - query: "NASA OR space OR Mars OR telescope OR satellite"
      category: science
      page_size: 8
    - query: "artificial intelligence OR OpenAI OR Nvidia OR cybersecurity"
      category: technology-ai
      page_size: 8

# OpenAI model settings (legacy — pipeline uses llm.* below)
openai:
  model: "gpt-4o-mini"
  temperature: 0.85
  headline_temperature: 0.9
  max_tokens: 2000

# LLM routing — Gemini for body quality, Groq for fast headlines + fallback
llm:
  retry:
    max_attempts: 3
    backoff_seconds: [8, 20, 45]
    min_body_words: 400
    min_body_chars: 1200
  body:
    primary: gemini
    fallback: groq
  headline:
    primary: groq
    fallback: gemini
  gemini:
    model: gemini-2.5-flash
    headline_model: gemini-2.5-flash
    # false = Google AI Studio (generativelanguage.googleapis.com). true = Vertex AI.
    vertexai: false
    temperature: 0.85
    max_output_tokens: 8192
    headline_temperature: 0.9
    headline_max_output_tokens: 512
  groq:
    model: llama-3.3-70b-versatile
    fallback_model: llama-3.1-8b-instant
    headline_model: llama-3.1-8b-instant
    temperature: 0.85
    headline_temperature: 0.9
    max_tokens: 2000
    headline_max_tokens: 400

default_category: current-affairs

# Tier 1 editorial product
breaking:
  enabled: true
  min_trend_score: 7
  desks:
    - war-conflict
    - middle-east
    - current-affairs
    - crime-justice
    - united-kingdom
    - south-asia

# Re-gather same source URL → append developing update log (no new post)
developing:
  enabled: true
  update_window_hours: 48

# On The Record — interview reviews (auto-published when quality gate passes)
on_the_record:
  enabled: true
  max_per_run: 2
  tag: "On The Record"
  default_desk: united-states
  trend_score_boost: 4.0
  tones:
    - critical
    - contradiction
    - skeptical
    - encouraging
    - wry
  topic_queries:
    - query: '(Trump OR Biden OR Harris OR president) AND (interview OR "sit-down" OR exclusive OR "one-on-one")'
      category: united-states
      page_size: 6
      format: on_the_record
    - query: '(Starmer OR "prime minister") AND (interview OR BBC OR Sky OR "sit-down")'
      category: united-kingdom
      page_size: 5
      format: on_the_record

crisis_mode:
  enabled: false
  desks:
    - war-conflict
    - middle-east
    - current-affairs
    - united-states

editorial_calendar:
  enabled: true
  weekdays:
    monday: "Week opener — UK/US politics and what moved over the weekend"
    tuesday: "Deep dive — technology & AI explainers"
    wednesday: "Regional focus — Middle East or South Asia"
    thursday: "Diplomacy & security on focus desks; fashion when a strong story lands"
    friday: "Fashion & style niche + lighter culture reads that still have an angle"
    saturday: "Weekend long read — one strong narrative on a focus desk"
    sunday: "Week ahead — preview stakes for Monday politics, tech, and markets"
    default: "Prefer focus desks: Middle East, South Asia, UK, US, Tech, Fashion"

budget:
  enabled: true
  monthly_cap_usd: 80
  alert_at_percent: 80
  weekly_summary: true
  estimates:
    llm_per_article_usd: 0.0
    openai_per_1k_output_tokens: 0.0006
    openai_per_article_tokens: 2500
    pipeline_base_per_run: 0.02

# Auto-post live articles after pipeline publish (FREE channels only — no paid APIs)
social:
  enabled: true
  max_posts_per_run: 5
  bluesky:
    enabled: true
    max_length: 300
  mastodon:
    # Free — set MASTODON_BASE_URL + MASTODON_ACCESS_TOKEN, then enabled: true
    enabled: false
    max_length: 500
  telegram_channel:
    # Free — create a public channel, add your bot as admin, set TELEGRAM_CHANNEL_ID
    enabled: false
    max_length: 1000
    # chat_id: "@waqya_news"   # or numeric -100…; can also use env TELEGRAM_CHANNEL_ID
  # X/Twitter intentionally omitted — write API is paid; use Bluesky/Mastodon/Telegram instead.
