# ── Waqya.com Pipeline Configuration ──

site:
  name: "Waqya"
  tagline: "The incident is the story. We unpack what happened—and what it means next."
  url: "https://waqya.com"

# How many articles to generate per pipeline run
pipeline:
  max_articles_per_run: 8
  min_words: 600
  max_words: 1200
  delay_between_articles_seconds: 25
  # true = publish live immediately (no manual approve). false = drafts for review.
  auto_publish: true
  # quality_gated = auto-publish when score >= threshold; else draft + Telegram hold
  publish_mode: quality_gated
  require_min_quality_score: 70
  always_draft_below_score: 55
  # Spread stories across desks; block duplicate topic clusters (Hantavirus ×8, etc.)
  diversity:
    enabled: true
    max_per_cluster_per_run: 1
    max_per_primary_per_run: 3
    min_distinct_primaries_per_run: 3
    cluster_overlap_threshold: 0.42
    # Shorter window = softer "already covered" scoring (not hard blocks)
    recent_hours: 24
    trending_score_cap: 10.0
    saturation_penalty: 5.0
    primary_daily_cap: 4

# Taxonomy source of truth: automation/waqya_categories.yaml
taxonomy:
  source: waqya_categories.yaml

# Images: 1 hero (featured) + inline images in article body
images:
  enabled: true
  provider: pexels
  inline_count: 3
  fallbacks:
    - og_image

# Automated SEO after each publish
seo:
  enabled: true
  ping_sitemaps: true
  add_schema: true
  add_related_links: true
  indexnow: false  # set true after INDEXNOW_KEY is on site root
  seo_title_max_chars: 55
  meta_description_min_chars: 135
  meta_description_max_chars: 155

# RSS feeds: defined in waqya_categories.yaml when taxonomy.source is set
rss_feeds: []

trending:
  enabled: true
  newsapi_top_headlines: true
  google_trends: true
  max_keywords: 40
  search_top_queries: 3

# NewsAPI settings (supplements RSS)
newsapi:
  enabled: true
  # Developer (free) tier: ~100 requests/day — we budget ~20/run × 6 runs/day
  domains: "bbc.co.uk,reuters.com,techcrunch.com,theverge.com,arstechnica.com,aljazeera.com,theguardian.com,dw.com,france24.com"
  language: "en"
  sort_by: "publishedAt"
  page_size: 25
  top_headlines_page_size: 12
  top_headline_categories:
    - general
    - business
    - technology
    - science
    - health
  # Country headlines (NewsAPI country codes)
  regional_countries:
    ae: middle-east
    il: middle-east
    in: south-asia
    gb: united-kingdom
    us: united-states
  # Targeted searches (uses /everything — 1 request each)
  topic_queries:
    - query: "Gaza OR Israel OR Iran OR Hezbollah OR Yemen"
      category: middle-east
      page_size: 8
    - query: "India OR Pakistan OR Bangladesh OR Kashmir"
      category: south-asia
      page_size: 8
    - query: "NASA OR space OR Mars OR telescope OR satellite"
      category: science
      page_size: 8
    - query: "artificial intelligence OR OpenAI OR Nvidia OR cybersecurity"
      category: technology-ai
      page_size: 8

# OpenAI model settings
openai:
  model: "gpt-4o-mini"
  temperature: 0.85
  headline_temperature: 0.9
  max_tokens: 2000

default_category: current-affairs

# Tier 1 editorial product
breaking:
  enabled: true
  min_trend_score: 7
  desks:
    - war-conflict
    - middle-east
    - current-affairs

crisis_mode:
  enabled: false
  desks:
    - war-conflict
    - middle-east
    - current-affairs
    - united-states

editorial_calendar:
  enabled: true
  weekdays:
    monday: "Week opener — politics, markets, and what moved over the weekend"
    tuesday: "Deep dive — technology, science, or business explainers"
    wednesday: "Regional focus — Middle East or South Asia when stories warrant"
    thursday: "Conflict & security — war, diplomacy, migration"
    friday: "Culture & lighter reads — entertainment, sport, human interest"
    saturday: "Weekend long read — one strong narrative piece"
    sunday: "Week ahead — preview stakes for Monday markets and diplomacy"
    default: "Balanced mix across desks"

budget:
  enabled: true
  monthly_cap_usd: 80
  alert_at_percent: 80
  weekly_summary: true
  estimates:
    openai_per_1k_output_tokens: 0.0006
    openai_per_article_tokens: 2500
    pipeline_base_per_run: 0.02
