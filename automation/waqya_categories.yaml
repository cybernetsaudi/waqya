# Waqya Editorial Taxonomy v2
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE: Single source of truth for automation + WordPress + frontend menus.
#
# ARCHITECTURE (avoids menu chaos):
#   1. primary_category — ONE per post (WordPress category, archive URL)
#   2. region_tags      — geographic scope (WordPress tags, ISO-style names)
#   3. topic_tags       — themes (WordPress tags; cross-cutting)
#   4. iptc_code        — stored in post meta (international standard)
#
# Frontend agent: use `menu` + `primary_categories` below.
# Regenerate JSON:  python export_categories.py
# ─────────────────────────────────────────────────────────────────────────────

version: 2
default_primary: current-affairs

classification_rules: |
  Pick exactly ONE primary_category key from primary_categories.
  NEVER default to current-affairs when a specific desk fits.
  If the story is mainly about a specific region, prefer a regional primary
  (e.g. middle-east, south-asia). If global or multi-region, prefer a topic
  primary (e.g. war-conflict, immigration-migration, politics-government).
  Health/virus/CDC → health-medicine. Stocks/Nvidia/Dow → markets-finance.
  Gaming/retro consoles → entertainment-arts. UK politics → united-kingdom.
  Fashion, runway, luxury brands, streetwear, Vogue → fashion-style.
  Always add 1-3 region_tags and 2-5 topic_tags when applicable.
  Map to iptc_code from the primary's iptc_reference field.

# ── Navigation structure (for theme menus — do not flatten) ─────────────────
menu:
  - id: news-desk
    label: News Desk
    items:
      - current-affairs
      - war-conflict
      - politics-government
      - diplomacy
      - elections
      - immigration-migration
      - human-rights
      - crime-justice
      - media-disinformation

  - id: regions
    label: Regions
    items:
      - middle-east
      - south-asia
      - east-asia
      - europe
      - united-kingdom
      - united-states
      - americas
      - africa
      - russia-central-asia
      - indo-pacific

  - id: topics
    label: Topics
    items:
      - religion-faith
      - business-economy
      - markets-finance
      - technology-ai
      - science
      - health-medicine
      - climate-environment
      - energy-resources
      - society-culture
      - fashion-style
      - labour-work
      - sport
      - entertainment-arts
      - education
      - disasters-emergencies

